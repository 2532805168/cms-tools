<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>话术素材库</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:13px;opacity:.85;margin-top:4px}
.stats-bar{display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:12px;opacity:.9}
.content{max-width:900px;margin:0 auto;padding:16px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;background:#fff;padding:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:90px;z-index:50}
.filter-btn{padding:6px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:all .2s}
.filter-btn.active{background:#667eea;color:#fff;border-color:#667eea}
.pair-card{background:#fff;border-radius:12px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;border:2px solid transparent}
.pair-card.extracted{opacity:.7;border-color:#ffa39e}
.pair-card video,.pair-card img{width:100%;max-height:400px;object-fit:contain;background:#000}
.pair-info{padding:16px}
.pair-info .name{font-weight:600;font-size:14px;margin-bottom:8px}
.platform-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-right:6px}
.tag-douyin{background:#fff0f0;color:#ff4d4f}
.tag-kuaishou{background:#fff7e6;color:#fa8c16}
.tag-xiaohongshu{background:#fff0f6;color:#eb2f96}
.tag-weixin{background:#f0fff0;color:#52c41a}
.tag-weibo{background:#fffbe6;color:#faad14}
.tag-bilibili{background:#f0f5ff;color:#597ef7}
.tag-default{background:#f5f5f5;color:#999}
.script-box{background:#f9f9ff;border:1px solid #e8e8f0;border-radius:8px;padding:12px;margin:12px 0;font-size:14px;line-height:1.6;white-space:pre-wrap;color:#555}
.pair-card.extracted .script-box{background:#f5f5f5;color:#aaa;text-decoration:line-through}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.btn-extract{background:#52c41a;color:#fff;flex:1;justify-content:center;font-weight:600}
.btn-extract:hover{background:#389e0d}
.btn-download{background:#667eea;color:#fff}
.btn-copy{background:#fff;border:1px solid #667eea;color:#667eea}
.btn:disabled{background:#d9d9d9;color:#fff;cursor:not-allowed;border:none}
.btn-extracted{background:#f5f5f5;color:#999;cursor:not-allowed;flex:1;justify-content:center;border:1px solid #d9d9d9}
.status-badge{display:inline-block;padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600}
.status-free{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.status-used{background:#fff1f0;color:#ff4d4f;border:1px solid #ffa39e}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:400px;width:90%;text-align:center}
.modal h3{margin-bottom:12px}
.modal p{font-size:14px;color:#666;margin-bottom:16px}
.modal .actions{justify-content:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.loading{text-align:center;padding:60px 20px;color:#aaa}
.loading .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#aaa}
.pair-type-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.type-video{background:#e6f7ff;color:#1890ff}
.type-comment{background:#fff7e6;color:#fa8c16}
</style>
</head>
<body>

<div class="header">
  <h1 id="shareTitle">📄 话术素材库</h1>
  <p id="shareDesc"></p>
  <div class="stats-bar">
    <span>🔗 总配对: <b id="statTotal">0</b></span>
    <span>🟢 可提取: <b id="statFree">0</b></span>
    <span>✅ 已提取: <b id="statUsed">0</b></span>
  </div>
</div>

<div class="content">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>
  
  <div id="mainContent" style="display:none">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterType('')">全部</button>
      <button class="filter-btn" onclick="filterType('video_copy')">🎬 视频配文案</button>
      <button class="filter-btn" onclick="filterType('comment')">🖼 图片配话术</button>
      <button class="filter-btn" onclick="filterStatus('free')">🟢 仅可提取</button>
      <button class="filter-btn" onclick="filterStatus('used')">✅ 仅已提取</button>
    </div>
    <div id="pairsList"></div>
  </div>
</div>

<!-- 提取确认弹窗 -->
<div class="modal-overlay" id="extractModal">
  <div class="modal">
    <h3>⚠️ 确认提取</h3>
    <p id="extractModalText">提取后此内容将锁定，其他人无法再提取。确定要提取吗？</p>
    <div class="actions">
      <button class="btn btn-copy" onclick="closeExtractModal()">取消</button>
      <button class="btn btn-extract" onclick="confirmExtract()">✅ 确认提取</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_SUPABASE_URL = 'https://mwitsgzwltsznfttgeyi.supabase.co';
const DEFAULT_SUPABASE_KEY = 'sb_publishable_16bSgqs3xqmN7FKlyKdmDw_eZzqmiF4';
let supabaseClient = null;
let allPairs = [];
let currentTypeFilter = '';
let currentStatusFilter = '';
let pendingExtractId = null;

function cleanSupabaseUrl(raw) {
  if (!raw) return raw;
  let u = raw.trim().replace(/\/+$/, '');
  if (u.endsWith('/rest/v1')) u = u.slice(0, -8);
  else if (u.endsWith('/rest')) u = u.slice(0, -5);
  return u.replace(/\/+$/, '');
}

function initSupabase() {
  const url = cleanSupabaseUrl(localStorage.getItem('supabase_url') || DEFAULT_SUPABASE_URL);
  const key = localStorage.getItem('supabase_key') || DEFAULT_SUPABASE_KEY;
  if (url && key) { supabaseClient = supabase.createClient(url, key); return true; }
  return false;
}

async function loadData() {
  if (!initSupabase()) { document.getElementById('loading').innerHTML = '<p>❌ 无法连接数据库</p>'; return; }
  const urlParams = new URLSearchParams(window.location.search);
  const shareId = urlParams.get('sid') || '';
  
  try {
    // 加载分享信息
    if (shareId) {
      const { data: share } = await supabaseClient.from('shares').select('*').eq('share_id', shareId).single();
      if (share) {
        document.getElementById('shareTitle').textContent = '📄 ' + share.title;
        if (share.description) document.getElementById('shareDesc').textContent = share.description;
        // 增加浏览次数
        await supabaseClient.from('shares').update({ view_count: (share.view_count || 0) + 1 }).eq('share_id', shareId);
      }
    }
    
    // 加载所有配对（带媒体和话术信息）
    const { data: pairs, error } = await supabaseClient.from('pairs').select(`
      *,
      media:media_assets(*),
      script:scripts(*)
    `).order('created_at', { ascending: false });
    
    if (error) throw error;
    allPairs = pairs || [];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    updateStats();
    renderPairs();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p>❌ 加载失败: ' + e.message + '</p>';
  }
}

function updateStats() {
  const total = allPairs.length;
  const used = allPairs.filter(p => p.is_extracted).length;
  const free = total - used;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statFree').textContent = free;
  document.getElementById('statUsed').textContent = used;
}

function filterType(type) {
  currentTypeFilter = type;
  currentStatusFilter = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderPairs();
}

function filterStatus(status) {
  currentStatusFilter = status;
  currentTypeFilter = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderPairs();
}

function renderPairs() {
  let list = allPairs;
  if (currentTypeFilter) list = list.filter(p => p.pair_type === currentTypeFilter);
  if (currentStatusFilter === 'free') list = list.filter(p => !p.is_extracted);
  if (currentStatusFilter === 'used') list = list.filter(p => p.is_extracted);
  
  const container = document.getElementById('pairsList');
  if (list.length === 0) { container.innerHTML = '<div class="empty">暂无内容</div>'; return; }
  
  container.innerHTML = list.map(p => {
    const isVideo = p.media?.type === 'video';
    const typeLabel = p.pair_type === 'video_copy' ? '视频配文案' : '图片配话术';
    return `
    <div class="pair-card ${p.is_extracted ? 'extracted' : ''}" id="pair-${p.id}">
      ${isVideo 
        ? `<video src="${p.media?.url}" controls preload="metadata"></video>`
        : `<img src="${p.media?.url}" loading="lazy">`}
      <div class="pair-info">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
          <div class="name">${isVideo ? '🎬 ' : '🖼 '}${p.media?.name || ''}</div>
          <span class="status-badge ${p.is_extracted ? 'status-used' : 'status-free'}">
            ${p.is_extracted ? '✅ 已被提取' : '🟢 可提取'}
          </span>
        </div>
        <div style="margin-top:4px">
          <span class="platform-tag ${platformClass(p.media?.platform)}">${p.media?.platform || '通用'}</span>
          <span class="pair-type-tag ${p.pair_type === 'video_copy' ? 'type-video' : 'type-comment'}">${typeLabel}</span>
        </div>
        <div class="script-box">
          <b style="font-size:12px;color:#888">📝 ${p.script?.title || ''}</b><br><br>
          ${(p.script?.content || '').replace(/\n/g, '<br>')}
        </div>
        <div class="actions">
          ${p.is_extracted 
            ? `<button class="btn btn-extracted" disabled>🔒 已被提取</button>`
            : `<button class="btn btn-extract" onclick="openExtractModal(${p.id})">✅ 立即提取</button>`}
          ${!p.is_extracted ? `
            <button class="btn btn-download" onclick="downloadMedia('${p.media?.url}','${(p.media?.name||'file').replace(/'/g,"\\'")}')">⬇ 下载</button>
            <button class="btn btn-copy" onclick="copyText('${(p.script?.content||'').replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">📋 复制文案</button>
          ` : ''}
        </div>
        ${p.is_extracted && p.extracted_at ? `<p style="font-size:11px;color:#aaa;margin-top:8px">提取时间: ${new Date(p.extracted_at).toLocaleString()}</p>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openExtractModal(pairId) {
  pendingExtractId = pairId;
  document.getElementById('extractModal').classList.add('show');
}

function closeExtractModal() {
  pendingExtractId = null;
  document.getElementById('extractModal').classList.remove('show');
}

async function confirmExtract() {
  if (!pendingExtractId) return;
  const pairId = pendingExtractId;
  closeExtractModal();
  
  // 先检查是否已被提取（并发保护）
  const { data: current } = await supabaseClient.from('pairs').select('is_extracted').eq('id', pairId).single();
  if (current && current.is_extracted) {
    showToast('❌ 该内容刚被其他人提取了');
    await loadData();
    return;
  }
  
  // 生成提取者标识
  const extractedBy = 'user_' + Math.random().toString(36).slice(2, 10);
  
  // 标记为已提取
  const { error } = await supabaseClient.from('pairs').update({
    is_extracted: true,
    extracted_by: extractedBy,
    extracted_at: new Date().toISOString()
  }).eq('id', pairId).eq('is_extracted', false); // 防止并发
  
  if (error) {
    showToast('❌ 提取失败: ' + error.message);
    return;
  }
  
  // 检查是否真的更新了（防止并发竞争）
  const { data: updated } = await supabaseClient.from('pairs').select('is_extracted').eq('id', pairId).single();
  if (!updated || !updated.is_extracted) {
    showToast('❌ 该内容刚被其他人提取了');
    await loadData();
    return;
  }
  
  showToast('✅ 提取成功！已下载视频/图片并复制文案');
  
  // 自动下载媒体 + 复制文案
  const pair = allPairs.find(p => p.id === pairId);
  if (pair) {
    // 下载媒体
    if (pair.media?.url) {
      const a = document.createElement('a');
      a.href = pair.media.url; a.download = pair.media.name || 'file';
      a.target = '_blank';
      document.body.appendChild(a); a.click(); a.remove();
    }
    // 复制文案
    if (pair.script?.content) {
      try { await navigator.clipboard.writeText(pair.script.content); } catch(e) {}
    }
  }
  
  // 刷新列表
  await loadData();
}

function downloadMedia(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.target = '_blank';
  document.body.appendChild(a); a.click(); a.remove();
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); showToast('✅ 已复制文案'); }
  catch(e) { showToast('复制失败'); }
}

function platformClass(pf) {
  const map = { '抖音':'tag-douyin','快手':'tag-kuaishou','小红书':'tag-xiaohongshu','微信':'tag-weixin','微博':'tag-weibo','B站':'tag-bilibili' };
  return map[pf] || 'tag-default';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 启动
loadData();

// 每30秒刷新一次（同步其他人的提取状态）
setInterval(() => {
  if (document.getElementById('mainContent').style.display === 'block') loadData();
}, 30000);
</script>
</body>
</html>

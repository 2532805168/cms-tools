<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS 内容管理后台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#333}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:700}
.stats-bar{display:flex;gap:16px;font-size:13px;opacity:.9;flex-wrap:wrap}
.stats-bar b{font-size:16px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;overflow-x:auto;position:sticky;top:0;z-index:10}
.tab{padding:14px 20px;cursor:pointer;border:none;background:none;font-size:14px;color:#666;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:#667eea;border-bottom-color:#667eea;font-weight:600}
.tab:hover{background:#f9f9ff}
.content{max-width:1200px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h3{font-size:16px;margin-bottom:16px;border-left:4px solid #667eea;padding-left:10px}
.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.form-group{flex:1;min-width:180px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:all .2s}
.btn-primary{background:#667eea;color:#fff}
.btn-primary:hover{background:#5568d3}
.btn-success{background:#52c41a;color:#fff}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#ff7875}
.btn-outline{background:#fff;border:1px solid #ddd;color:#666}
.btn-outline:hover{border-color:#667eea;color:#667eea}
.btn-warning{background:#fa8c16;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-douyin{background:#fff0f0;color:#ff4d4f}
.tag-kuaishou{background:#fff7e6;color:#fa8c16}
.tag-xiaohongshu{background:#fff0f6;color:#eb2f96}
.tag-weixin{background:#f0fff0;color:#52c41a}
.tag-weibo{background:#fffbe6;color:#faad14}
.tag-bilibili{background:#f0f5ff;color:#597ef7}
.tag-default{background:#f5f5f5;color:#999}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.script-item{background:#f9f9ff;border:1px solid #e8e8f0;border-radius:8px;padding:12px;margin-bottom:8px;transition:all .2s}
.script-item .title{font-weight:600;font-size:14px;margin-bottom:4px}
.script-item .content{font-size:13px;color:#666;white-space:pre-wrap;max-height:80px;overflow:hidden}
.script-item .meta{display:flex;gap:8px;margin-top:6px;font-size:11px;color:#aaa}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px}
.checkbox-item{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:13px;user-select:none}
.checkbox-item.checked{background:#667eea;color:#fff;border-color:#667eea}
.upload-zone{border:2px dashed #d9d9d9;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:#667eea;background:#f9f9ff}
.upload-zone .icon{font-size:48px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.share-link-box{background:#f5f5f5;border:1px solid #ddd;border-radius:8px;padding:12px;word-break:break-all;font-size:13px;margin:8px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.pair-card{background:#fff;border:1px solid #eee;border-radius:8px;overflow:hidden}
.pair-card img,.pair-card video{width:100%;height:140px;object-fit:cover}
.pair-info{padding:10px}
.pair-info .name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pair-info .script-title{font-size:12px;color:#667eea;font-weight:600;margin-bottom:4px}
.pair-info .script-content{font-size:11px;color:#888;white-space:pre-wrap;max-height:60px;overflow:hidden;background:#f9f9ff;padding:6px;border-radius:4px}
.pair-status{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-top:4px}
.status-free{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.status-used{background:#fff1f0;color:#ff4d4f;border:1px solid #ffa39e}
.empty{text-align:center;color:#aaa;padding:40px 20px}
.unpaired-list{max-height:300px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:8px}
.unpaired-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #f5f5f5;font-size:13px}
.unpaired-item:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="header">
  <h1>📡 CMS 内容管理后台</h1>
  <div class="stats-bar">
    <span>📄 文案: <b id="statScripts">0</b></span>
    <span>🎬 媒体: <b id="statMedia">0</b></span>
    <span>🔗 配对: <b id="statPairs">0</b></span>
    <span>✅ 已提取: <b id="statExtracted">0</b></span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(event,'generate')">🤖 AI批量生成</button>
  <button class="tab" onclick="switchTab(event,'media')">🎬 媒体上传</button>
  <button class="tab" onclick="switchTab(event,'pair')">🔗 配对管理</button>
  <button class="tab" onclick="switchTab(event,'share')">📤 分享链接</button>
  <button class="tab" onclick="switchTab(event,'config')">⚙️ 配置</button>
</div>

<div class="content">

<!-- AI批量生成 -->
<div id="tab-generate" class="tab-content">
  <div class="card">
    <h3>🤖 智能批量生成话术</h3>
    <div class="form-row">
      <div class="form-group">
        <label>选择平台（可多选）</label>
        <div class="checkbox-group" id="genPlatforms"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>话术类型</label>
        <select id="genType">
          <option value="评论话术">评论话术（配图片）</option>
          <option value="视频文案">视频文案（配视频）</option>
        </select>
      </div>
      <div class="form-group">
        <label>主题关键词（如：补水面膜）</label>
        <input type="text" id="genTopic" placeholder="输入产品/主题关键词">
      </div>
      <div class="form-group" style="max-width:140px">
        <label>每平台生成条数</label>
        <input type="number" id="genCount" value="5" min="1" max="20">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" onclick="generateAndSave()">💾 生成并保存</button>
    </div>
  </div>
  <div class="card" id="genResult" style="display:none">
    <h3>📋 生成结果</h3>
    <div id="genResultList"></div>
  </div>

    <p style="font-size:12px;color:#888;margin-bottom:12px">可按平台、类型批量删除已生成的话术</p>
    <div class="form-row">
      <div class="form-group" style="max-width:200px">
        <label>平台</label>
        <select id="batchDelScriptPlatform">
          <option value="">全部平台</option>
          <option value="抖音">抖音</option>
          <option value="快手">快手</option>
          <option value="小红书">小红书</option>
          <option value="微信">微信</option>
          <option value="微博">微博</option>
          <option value="B站">B站</option>
        </select>
      </div>
      <div class="form-group" style="max-width:200px">
        <label>类型</label>
        <select id="batchDelScriptType">
          <option value="">全部类型</option>
          <option value="评论话术">评论话术</option>
          <option value="视频文案">视频文案</option>
        </select>
      </div>
      <div class="form-group" style="max-width:120px;display:flex;align-items:flex-end">
        <button class="btn btn-danger" onclick="batchDeleteScripts()">🗑 批量删除</button>
      </div>
    </div>
  </div>
</div>

<!-- 媒体上传 -->
<div id="tab-media" class="tab-content" style="display:none">
  <div class="card">
    <h3>🎬 批量上传视频/图片</h3>
    <div class="form-row">
      <div class="form-group">
        <label>归类平台</label>
        <select id="mediaPlatform"></select>
      </div>
    </div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📁</div>
      <p>点击或拖拽文件到此区域上传</p>
      <p style="font-size:12px;color:#aaa">视频会配对视频文案，图片会配对评论话术</p>
      <input type="file" id="fileInput" multiple accept="video/*,image/*" onchange="handleFileSelect(event)" style="display:none">
    </div>
    <div id="uploadProgress" style="margin-top:12px"></div>
  </div>
</div>

<!-- 配对管理 -->
<div id="tab-pair" class="tab-content" style="display:none">
  <!-- 数据统计卡片 -->
  <div class="card" style="background:linear-gradient(135deg,#f0f5ff,#fff)">
    <h3>📊 提取数据统计</h3>
    <div id="extractStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px"></div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0;border:none;padding:0">🔗 配对管理</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-success btn-sm" onclick="autoPairAll('video')">🎬 视频配文案</button>
        <button class="btn btn-warning btn-sm" onclick="autoPairAll('image')">🖼 图片配话术</button>
        <button class="btn btn-outline btn-sm" onclick="resetAllExtracted()">♻️ 一键复原所有提取</button>
        <button class="btn btn-danger btn-sm" onclick="deleteAllPairs()">🗑 一键删除所有配对</button>
        <button class="btn btn-outline btn-sm" onclick="loadPairs()">🔄 刷新</button>
      </div>
    </div>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group" style="max-width:200px">
        <label>筛选类型</label>

          <option value="video_copy">视频配文案</option>

      </div>

          <option value="free">未提取</option>

  </div>
  <div class="card">
    <h3>📋 未配对资源</h3>

        <div class="unpaired-list" id="unpairedVideos"></div>
      </div>
      <div>
        <b style="font-size:13px;color:#666">🖼 未配对图片：</b>
        <div class="unpaired-list" id="unpairedImages"></div>
      </div>
    </div>
  </div>
</div>

<!-- 分享链接 -->
<div id="tab-share" class="tab-content" style="display:none">

    <h3>📤 分享链接</h3>

  </div>
</div>

<!-- 配置 -->

        <label>Project URL</label>

    </div>

    <div id="configStatus" style="margin-top:12px"></div>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_SUPABASE_URL = 'https://mwitsgzwltsznfttgeyi.supabase.co';

// 清理 Supabase URL：自动去掉 /rest/v1 等多余后缀
function cleanSupabaseUrl(raw) {
  if (!raw) return raw;
  let u = raw.trim().replace(/\/+$/, '');
  // 去掉 /rest/v1 或 /rest/v1/ 后缀（SDK 会自动拼接）
  if (u.endsWith('/rest/v1')) u = u.slice(0, -8);
  else if (u.endsWith('/rest')) u = u.slice(0, -5);
  return u.replace(/\/+$/, '');
}

function loadConfig() {
  const rawUrl = localStorage.getItem('supabase_url') || DEFAULT_SUPABASE_URL;
  const url = cleanSupabaseUrl(rawUrl);
  const key = localStorage.getItem('supabase_key') || DEFAULT_SUPABASE_KEY;
  const siteUrl = localStorage.getItem('site_url') || '';
  if (document.getElementById('supabaseUrl')) document.getElementById('supabaseUrl').value = url;
  if (document.getElementById('supabaseKey')) document.getElementById('supabaseKey').value = key;
  if (document.getElementById('siteUrl')) document.getElementById('siteUrl').value = siteUrl;
  if (url && key) { supabaseClient = supabase.createClient(url, key); return true; }
  return false;
}

function saveConfig() {
  const url = cleanSupabaseUrl(document.getElementById('supabaseUrl').value);
  const key = document.getElementById('supabaseKey').value.trim();
  const siteUrl = document.getElementById('siteUrl').value.trim();
  if (!url || !key) { showToast('请填写完整'); return; }
  localStorage.setItem('supabase_url', url);
  localStorage.setItem('supabase_key', key);
  if (siteUrl) localStorage.setItem('site_url', siteUrl);
  supabaseClient = supabase.createClient(url, key);
  document.getElementById('configStatus').innerHTML = '<span style="color:#52c41a">✅ 配置已保存</span>';
  showToast('配置已保存'); loadStats();
}

async function testConnection() {
  if (!supabaseClient) { showToast('请先保存配置'); return; }
  try {
    const { data, error } = await supabaseClient.from('scripts').select('id').limit(1);
    if (error) throw error;
    document.getElementById('configStatus').innerHTML = '<span style="color:#52c41a">✅ 连接成功</span>';
    showToast('连接成功');
  } catch(e) {
    document.getElementById('configStatus').innerHTML = '<span style="color:#ff4d4f">❌ ' + e.message + '</span>';
  }
}

function generateItems(platforms, type, topic, count) {
  const topicStr = topic || '好物';
  const items = [];
  const usedTemplates = new Set();
  const poolKey = type === '视频文案' ? 'videoCopy' : 'comment';
  platforms.forEach(pf => {
    const pool = (GEN_TEMPLATES[poolKey] && GEN_TEMPLATES[poolKey][pf]) || GEN_TEMPLATES[poolKey]['抖音'] || [];
    const indices = [...pool.keys()].sort(() => Math.random() - 0.5);
    let picked = 0;
    for (const idx of indices) {
      if (picked >= count) break;
      const key = pf + '_' + idx;
      if (usedTemplates.has(key)) continue;
      usedTemplates.add(key);
      items.push({
        platform: pf, type,
        title: type === '视频文案' ? `${pf}·${topicStr}视频文案${picked+1}` : `${pf}·${topicStr}评论话术${picked+1}`,
        content: pool[idx].replace(/\{topic\}/g, topicStr)
      });
      picked++;
    }
    while (picked < count) {
      items.push({
        platform: pf, type,
        title: type === '视频文案' ? `${pf}·${topicStr}视频文案${picked+1}` : `${pf}·${topicStr}评论话术${picked+1}`,
        content: pool[picked % pool.length].replace(/\{topic\}/g, topicStr) + ' ' + (picked+1)
      });
      picked++;
    }
  });
  return items;
}

// 媒体上传（增强版：详细错误 + 文件大小检查 + 重试）
const MAX_FILE_SIZE = 50 * 1024 * 1024; // Supabase 免费限制 50MB

async function handleFileSelect(event) {
  const files = Array.from(event.target.files || []);
  if (files.length === 0) return;
  if (!supabaseClient) { showToast('❌ 请先配置 Supabase'); return; }

  const platform = document.getElementById('mediaPlatform').value || '通用';
  const progress = document.getElementById('uploadProgress');
  let successCount = 0;
  let failCount = 0;

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const isVideo = f.type.startsWith('video');
    const ext = f.name.split('.').pop().toLowerCase();
    // 清理文件名：去掉特殊字符，保留中文、英文、数字、.-_
    const safeName = f.name.replace(/[^\w\u4e00-\u9fa5.\-]/g, '_');
    const fileName = `${isVideo ? 'videos' : 'images'}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;

    // 文件大小检查
    if (f.size > MAX_FILE_SIZE) {
      const sizeMB = (f.size / 1024 / 1024).toFixed(1);
      progress.innerHTML = `<span style="color:#ff4d4f">⚠️ ${f.name} (${sizeMB}MB) 超过 50MB 限制，已跳过</span>`;
      failCount++;
      continue;
    }

    progress.innerHTML = `<span class="spinner"></span> 上传中 ${i+1}/${files.length}: ${f.name} (${(f.size/1024/1024).toFixed(1)}MB)...`;

    try {
      // Step 1: 上传到 Supabase Storage
      const { data: uploadData, error: upErr } = await supabaseClient.storage
        .from('media')
        .upload(fileName, f, {
          contentType: f.type || (isVideo ? 'video/mp4' : 'image/jpeg'),
          cacheControl: '3600',
          upsert: false
        });

      if (upErr) {
        // 如果是"already exists"，尝试用新文件名重试
        if (upErr.message && upErr.message.includes('already exists')) {
          const retryName = `${isVideo ? 'videos' : 'images'}/${Date.now()}-${Math.random().toString(36).slice(2,10)}-${safeName}`;
          const { error: retryErr } = await supabaseClient.storage.from('media').upload(retryName, f, { contentType: f.type });
          if (retryErr) throw retryErr;
          var finalPath = retryName;
        } else {
          throw upErr;
        }
      }
      var finalPath = fileName;

      // Step 2: 获取公开 URL
      const { data: urlData } = supabaseClient.storage.from('media').getPublicUrl(finalPath);
      const publicUrl = urlData.publicUrl;
      if (!publicUrl) throw new Error('获取公开链接失败');

      // Step 3: 写入数据库
      const { error: insertErr } = await supabaseClient.from('media_assets').insert({
        url: publicUrl,
        name: safeName,
        type: isVideo ? 'video' : 'image',
        platform: platform,
        size: f.size
      });
      if (insertErr) throw insertErr;

      successCount++;
    } catch(e) {
      failCount++;
      const errMsg = e?.message || JSON.stringify(e);
      console.error(`[上传失败] ${f.name}:`, e);
      progress.innerHTML += `<div style="color:#ff4d4f;font-size:12px;margin-top:4px">❌ ${f.name}: ${errMsg}</div>`;
    }
  }

  // 汇总结果
  if (successCount > 0) showToast(`✅ 成功 ${successCount} 个${failCount > 0 ? `，失败 ${failCount} 个` : ''}`);
  else if (failCount > 0) showToast(`❌ 全部失败 (${failCount} 个)，请查看上方错误信息`);

  setTimeout(() => { progress.innerHTML = ''; }, 5000); // 5秒后清空进度
  event.target.value = '';
  loadStats();

  // 切换到配对管理标签页提示用户
  if (successCount > 0) {
    document.querySelector('[onclick="switchTab(event,\'pair\')"]').click();
  }
}

// 配对管理
let allPairs = [];

async function autoPairAll(mediaType) {
  if (!supabaseClient) return;
  const scriptType = mediaType === 'video' ? '视频文案' : '评论话术';
  const pairType = mediaType === 'video' ? 'video_copy' : 'comment';
  
  // 获取未配对的媒体
  const { data: allMedia } = await supabaseClient.from('media_assets').select('*').eq('type', mediaType);
  const { data: pairedMedia } = await supabaseClient.from('pairs').select('media_id');
  const pairedMediaIds = new Set((pairedMedia||[]).map(p => p.media_id));
  const unpairedMedia = (allMedia||[]).filter(m => !pairedMediaIds.has(m.id));
  
  // 获取未配对的话术
  const { data: allScripts } = await supabaseClient.from('scripts').select('*').eq('type', scriptType);
  const { data: pairedScripts } = await supabaseClient.from('pairs').select('script_id');
  const pairedScriptIds = new Set((pairedScripts||[]).map(p => p.script_id));
  const unpairedScripts = (allScripts||[]).filter(s => !pairedScriptIds.has(s.id));
  
  if (unpairedMedia.length === 0) { showToast(`没有未配对的${mediaType === 'video' ? '视频' : '图片'}`); return; }
  if (unpairedScripts.length === 0) { showToast(`没有未配对的${scriptType}，请先生成`); return; }
  
  // 随机配对
  const shuffledScripts = [...unpairedScripts].sort(() => Math.random() - 0.5);
  const pairsToInsert = [];
  const maxPairs = Math.min(unpairedMedia.length, shuffledScripts.length);
  for (let i = 0; i < maxPairs; i++) {
    pairsToInsert.push({
      media_id: unpairedMedia[i].id,
      script_id: shuffledScripts[i].id,
      pair_type: pairType,
      is_extracted: false
    });
  }
  try {
    const { error } = await supabaseClient.from('pairs').insert(pairsToInsert);
    if (error) throw error;
    showToast(`✅ 成功配对 ${pairsToInsert.length} 组`);
    loadPairs(); loadStats();
  } catch(e) { showToast('配对失败: ' + e.message); }
}

async function loadPairs() {
  if (!supabaseClient) return;
  try {
    let data = [];
    
    // 方案A：尝试 JOIN 查询
    try {
      let query = supabaseClient.from('pairs').select(`
        *, media:media_assets(*), script:scripts(*)
      `).order('created_at', { ascending: false });
      const ft = document.getElementById('pairFilterType').value;
      const fs = document.getElementById('pairFilterStatus').value;
      if (ft) query = query.eq('pair_type', ft);
      if (fs === 'free') query = query.eq('is_extracted', false);
      if (fs === 'used') query = query.eq('is_extracted', true);
      const { data: joined, error: je } = await query;
      if (!je && joined) { data = joined; }
      else throw je;
    } catch(e) {
      // 方案B：分步查询
      const [pairRes, mediaRes, scriptRes] = await Promise.all([
        supabaseClient.from('pairs').select('*').order('created_at', { ascending: false }),
        supabaseClient.from('media_assets').select('*'),
        supabaseClient.from('scripts').select('*')
      ]);
      const mediaMap = {};
      (mediaRes.data || []).forEach(m => { mediaMap[m.id] = m; });
      const scriptMap = {};
      (scriptRes.data || []).forEach(s => { scriptMap[s.id] = s; });
      
      data = (pairRes.data || []).map(p => ({
        ...p,
        media: mediaMap[p.media_id] || null,
        script: scriptMap[p.script_id] || null
      }));
      
      // 应用筛选（因为 JOIN 失败了，这里需要手动过滤）
      const ft2 = document.getElementById('pairFilterType').value;
      const fs2 = document.getElementById('pairFilterStatus').value;
      if (ft2) data = data.filter(p => p.pair_type === ft2);
      if (fs2 === 'free') data = data.filter(p => !p.is_extracted);
      if (fs2 === 'used') data = data.filter(p => p.is_extracted);
    }
    
    allPairs = data;
    renderPairs(allPairs);
    loadUnpaired();
  } catch(e) { showToast('加载失败: ' + e.message); }
}

// 批量删除话术（按平台/类型）
async function batchDeleteScripts() {
  if (!supabaseClient) return;
  const platform = document.getElementById('batchDelScriptPlatform')?.value || '';
  const type = document.getElementById('batchDelScriptType')?.value || '';
  let query = supabaseClient.from('scripts').delete();
  if (platform) query = query.eq('platform', platform);
  if (type) query = query.eq('type', type);
  if (!platform && !type) {
    if (!confirm('⚠️ 未选择筛选条件，将删除全部话术！确定吗？')) return;
  } else {
    if (!confirm(`确定删除 ${platform || '全部平台'} 的 ${type || '全部类型'}？`)) return;
  }
  try {
    const { data, error } = await query.select();
    if (error) throw error;
    showToast(`✅ 已删除 ${data ? data.length : 0} 条`);
    loadStats();
  } catch(e) { showToast('删除失败: ' + e.message); }
}

// 统计
async function loadStats() {
  if (!supabaseClient) return;
  try {
    const [{ data: scripts }, { data: media }, { data: pairs }] = await Promise.all([
      supabaseClient.from('scripts').select('id'),
      supabaseClient.from('media_assets').select('id'),
      supabaseClient.from('pairs').select('id,is_extracted')
    ]);
    document.getElementById('statScripts').textContent = scripts ? scripts.length : 0;
    document.getElementById('statMedia').textContent = media ? media.length : 0;
    document.getElementById('statPairs').textContent = pairs ? pairs.length : 0;
    document.getElementById('statExtracted').textContent = pairs ? pairs.filter(p => p.is_extracted).length : 0;
    
    // 同步更新提取数据统计
    if (document.getElementById('extractStats')) {
      const [allMediaRes, allScriptRes] = await Promise.all([
        supabaseClient.from('media_assets').select('*'),
        supabaseClient.from('scripts').select('*')
      ]);
      renderExtractStats(pairs || [], allMediaRes.data || [], allScriptRes.data || []);
    }
  } catch(e) {}
}

function platformTag(pf) {
  const map = { '抖音':'douyin','快手':'kuaishou','小红书':'xiaohongshu','微信':'weixin','微博':'weibo','B站':'bilibili' };
  const cls = map[pf] || 'default';
  return `<span class="tag tag-${cls}">${pf || '通用'}</span>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(ev, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  ev.target.classList.add('active');
  document.getElementById('tab-' + name).style.display = 'block';
  if (name === 'pair') loadPairs();
  if (name === 'share') loadShares();
}

// 拖拽上传
const uploadZone = document.getElementById('uploadZone');
if (uploadZone) {
  uploadZone.ondragover = (e) => { e.preventDefault(); uploadZone.style.borderColor = '#667eea'; };
  uploadZone.ondragleave = () => { uploadZone.style.borderColor = '#d9d9d9'; };
  uploadZone.ondrop = (e) => {
    e.preventDefault();
    uploadZone.style.borderColor = '#d9d9d9';
    handleFileSelect({ target: { files: e.dataTransfer.files } });
  };
}

function togglePlatformItem(el, evt) {
  // 阻止冒泡和默认行为，避免 label/input 双触发
  if (evt) { evt.preventDefault(); evt.stopPropagation(); }
  const nowChecked = !el.classList.contains('checked');
  el.classList.toggle('checked', nowChecked);
  const input = el.querySelector('input');
  if (input) input.checked = nowChecked;
}

function initPlatforms() {
  const genDiv = document.getElementById('genPlatforms');
  genDiv.innerHTML = PLATFORMS.map((p, i) => `
    <div class="checkbox-item" data-platform="${p}" onclick="togglePlatformItem(this, event)">
      <input type="checkbox" class="gen-plat-cb" value="${p}" style="display:none"> ${p}
    </div>`).join('');
  const mediaSel = document.getElementById('mediaPlatform');
  if (mediaSel) mediaSel.innerHTML = PLATFORMS.map(p => `<option value="${p}">${p}</option>`).join('');
}

async function init() {
  initPlatforms();
  const configured = loadConfig();
  if (configured) loadStats();
}
init();
</script>
</body>
